<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FOUNDER</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: Arial;
    color: white;
    text-align: center;
    
    /* 🔥 พื้นหลัง */
    background: url('bg.gif') center/cover no-repeat fixed;
}

/* ดำโปร่งๆให้เท่ */
body::before {
    content: "";
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.6);
    top: 0;
    left: 0;
    z-index: 0;
}

/* ทุกอย่างอยู่บน layer */
.main {
    position: relative;
    z-index: 1;
}

/* หัว */
h1 {
    margin-top: 30px;
    font-size: 60px;
    color: red;
    text-shadow: 0 0 20px red, 0 0 40px red;
}

/* กล่อง */
.container {
    display: flex;
    justify-content: center;
    gap: 40px;
    margin-top: 60px;
    flex-wrap: wrap;
}

/* การ์ด */
.card {
    width: 200px;
    padding: 15px;
    border: 2px solid white;
    background: rgba(0,0,0,0.7);
    transition: 0.4s;
    backdrop-filter: blur(5px);
}

/* Hover เท่ๆ */
.card:hover {
    transform: scale(1.1) rotate(1deg);
    box-shadow: 0 0 25px red;
    border-color: red;
}

/* รูป */
.card img {
    width: 100%;
    height: 200px;
    object-fit: cover;
    border: 2px solid white;
}

/* ชื่อ */
.card h3 {
    margin-top: 10px;
}

/* ปุ่ม */
.btn {
    display: block;
    margin-top: 10px;
    padding: 8px;
    border: 1px solid white;
    color: white;
    text-decoration: none;
    transition: 0.3s;
}

.btn:hover {
    background: red;
    box-shadow: 0 0 10px red;
}

/* responsive */
@media (max-width: 800px) {
    .container {
        flex-direction: column;
        align-items: center;
    }
}
</style>
</head>

<body>

<div class="main">

<h1>FOUNDER</h1>

<div class="container">

    <div class="card">
        <img src="img.gif">
        <h3>TK PHUPRADUB</h3>
        <p>Founder</p>
        <a href="#" class="btn">Facebook</a>
    </div>

    <div class="card">
        <img src="img.gif">
        <h3>SKY PHUPRADUB</h3>
        <p>Founder</p>
        <a href="#" class="btn">Facebook</a>
    </div>

    <div class="card">
        <img src="img.gif">
        <h3>ARDUM PHUPRADUB</h3>
        <p>Founder</p>
        <a href="#" class="btn">Facebook</a>
    </div>

    <div class="card">
        <img src="img.gif">
        <h3>MILL PHUPRADUB</h3>
        <p>Founder</p>
        <a href="#" class="btn">Facebook</a>
    </div>

</div>

</div>

</body>
</html>
