<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FOUNDER</title>

<style>
body {
    margin: 0;
    background: url('bg.gif') center/cover no-repeat fixed;
    font-family: monospace;
    color: white;
}

/* ลดแสงพื้นหลัง */
body::after {
    content: "";
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.7);
    top: 0;
    left: 0;
    z-index: 0;
}

h1 {
    text-align: center;
    margin-top: 40px;
    font-size: 50px;
    color: #ff3c3c;
    text-shadow: 0 0 20px red;
    z-index: 1;
    position: relative;
}

/* layout */
.container {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 40px;
    margin-top: 80px;
    z-index: 1;
    position: relative;
}

/* card */
.card {
    width: 220px;
    background: black;
    border: 2px solid white;
    padding: 15px;
    text-align: center;
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.05);
    box-shadow: 0 0 25px white;
}

/* รูป */
.card img {
    width: 100%;
    height: 200px;
    object-fit: cover;
    border: 1px solid white;
}

/* ชื่อ */
.name {
    margin-top: 10px;
    font-size: 18px;
    font-weight: bold;
}

/* role */
.role {
    font-size: 14px;
    color: gray;
}

/* ปุ่ม */
.btn {
    display: block;
    margin-top: 10px;
    padding: 8px;
    border: 1px solid white;
    color: white;
    text-decoration: none;
}

.btn:hover {
    background: white;
    color: black;
}
</style>

</head>

<body>

<h1>FOUNDER</h1>

<div class="container">

    <div class="card">
        <img src="profile.gif">
        <div class="name">TK PHUPRADUB</div>
        <div class="role">Founder</div>
        <a href="#" class="btn">Facebook</a>
    </div>

    <div class="card">
        <img src="profile.gif">
        <div class="name">SKY PHUPRADUB</div>
        <div class="role">Founder</div>
        <a href="#" class="btn">Facebook</a>
    </div>

    <div class="card">
        <img src="profile.gif">
        <div class="name">ARDUM PHUPRADUB</div>
        <div class="role">Founder</div>
        <a href="#" class="btn">Facebook</a>
    </div>

    <div class="card">
        <img src="profile.gif">
        <div class="name">MILL PHUPRADUB</div>
        <div class="role">Founder</div>
        <a href="#" class="btn">Facebook</a>
    </div>

</div>

</body>
</html>
