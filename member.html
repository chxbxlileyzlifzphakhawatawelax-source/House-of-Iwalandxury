<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>FOUNDER</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

/* 🔥 FIX ช่องล่างหาย 100% */
html, body {
    height: 100%;
    background: black;
    font-family: Arial;
    color: white;
}

/* 🔥 background เต็มจอจริง */
body::before {
    content: "";
    position: fixed;
    inset: 0;
    background: url("./bg.gif") center center / cover no-repeat;
    z-index: -1;
}

/* TITLE */
h1 {
    text-align: center;
    margin-top: 40px;
    font-size: 50px;
    color: red;
    text-shadow: 0 0 20px red, 0 0 40px red;
}

/* CONTAINER */
.container {
    min-height: calc(100vh - 120px);
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 40px;
    flex-wrap: wrap;
    padding: 40px 20px;
}

/* CARD */
.card {
    width: 230px;
    padding: 15px;
    border: 2px solid white;
    text-align: center;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(6px);
    transition: 0.4s;
}

/* HOVER เท่ๆ */
.card:hover {
    transform: scale(1.05);
    box-shadow: 0 0 25px red;
}

/* IMAGE */
.card img {
    width: 100%;
    height: 200px;
    object-fit: cover;
    border: 2px solid white;
}

/* TEXT */
.name {
    margin-top: 10px;
    font-weight: bold;
}

.role {
    font-size: 13px;
    color: #aaa;
}

/* BUTTON */
.btn {
    display: block;
    margin-top: 10px;
    padding: 10px;
    border: 1px solid white;
    text-decoration: none;
    color: white;
    transition: 0.3s;
}

.btn:hover {
    background: red;
    box-shadow: 0 0 15px red;
}
</style>
</head>

<body>

<h1>MEMBER</h1>

<div class="container">

<div class="card">
<img src="./profile.png">
<div class="name">TK PHUPRADUB</div>
<div class="role">Founder</div>
<a href="#" class="btn">Facebook</a>
</div>

<div class="card">
<img src="./profile.png">
<div class="name">SKY PHUPRADUB</div>
<div class="role">Founder</div>
<a href="#" class="btn">Facebook</a>
</div>

<div class="card">
<img src="./profile.png">
<div class="name">ARDUM PHUPRADUB</div>
<div class="role">Founder</div>
<a href="#" class="btn">Facebook</a>
</div>

<div class="card">
<img src="./profile.png">
<div class="name">MILL PHUPRADUB</div>
<div class="role">Founder</div>
<a href="#" class="btn">Facebook</a>
</div>

</div>

</body>
</html>
