<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Member</title>

<style>
body { margin:0; background:black; color:white; font-family:Arial; }
.header { text-align:center; font-size:30px; padding:20px; text-shadow:0 0 20px red; }
.container { display:flex; flex-wrap:wrap; justify-content:center; gap:30px; padding:40px; }
.card { width:200px; border:2px solid white; padding:15px; text-align:center; transition:0.3s; }
.card:hover { transform:scale(1.1); box-shadow:0 0 20px red; }
.icon { font-size:80px; }
</style>
</head>

<body>

<div class="header">MEMBER</div>

<div class="container">
    <div class="card"><div class="icon">✶</div><div>Member1</div></div>
    <div class="card"><div class="icon">✶</div><div>Member2</div></div>
</div>

</body>
</html>
