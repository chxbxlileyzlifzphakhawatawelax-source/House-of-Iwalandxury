<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>FOUNDER</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: url("bg.gif") no-repeat center center/cover;
    color: white;
    text-align: center;
}

/* overlay */
body::before {
    content: "";
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.6);
    z-index: -1;
}

h1 {
    color: red;
    margin-top: 40px;
    text-shadow: 0 0 20px red;
}

.container {
    display: flex;
    justify-content: center;
    gap: 30px;
    margin-top: 60px;
}

.card {
    border: 2px solid white;
    padding: 15px;
    width: 180px;
    background: rgba(0,0,0,0.7);
}

.card img {
    width: 100%;
    border: 2px solid white;
}

.name {
    margin-top: 10px;
    font-weight: bold;
}

.role {
    font-size: 12px;
    margin-bottom: 10px;
}

/* 🔥 ปุ่ม Facebook ใหม่ */
.fb-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    border: 1px solid white;
    padding: 8px;
    text-decoration: none;
    color: white;
    transition: 0.3s;
}

.fb-btn:hover {
    background: #1877f2;
    box-shadow: 0 0 10px #1877f2;
}

/* ไอคอน */
.fb-icon {
    font-weight: bold;
    color: #1877f2;
}
</style>

</head>

<body>

<h1>FOUNDER</h1>

<div class="container">

    <!-- TK -->
    <div class="card">
        <img src="img.jpg">
        <div class="name">TK PHUPRADUB</div>
        <div class="role">Founder</div>
        <a class="fb-btn" href="#" target="_blank">
            <span class="fb-icon">f</span> Facebook
        </a>
    </div>

    <!-- SKY -->
    <div class="card">
        <img src="img.jpg">
        <div class="name">SKY PHUPRADUB</div>
        <div class="role">Founder</div>
        <a class="fb-btn" href="#" target="_blank">
            <span class="fb-icon">f</span> Facebook
        </a>
    </div>

    <!-- ARDUM -->
    <div class="card">
        <img src="img.jpg">
        <div class="name">ARDUM PHUPRADUB</div>
        <div class="role">Founder</div>
        <a class="fb-btn" href="#" target="_blank">
            <span class="fb-icon">f</span> Facebook
        </a>
    </div>

    <!-- MILL -->
    <div class="card">
        <img src="img.jpg">
        <div class="name">MILL PHUPRADUB</div>
        <div class="role">Founder</div>
        <a class="fb-btn" href="#" target="_blank">
            <span class="fb-icon">f</span> Facebook
        </a>
    </div>

</div>

</body>
</html>
