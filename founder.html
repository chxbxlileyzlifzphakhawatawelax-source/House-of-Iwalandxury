<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Iwalandxury</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    height: 100vh;
    background: url("bg.gif") no-repeat center center/cover;
    display: flex;
    justify-content: center;
    align-items: center;
    color: white;
}

/* overlay กันจอดำ */
body::before {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.6);
    z-index: 0;
}

/* container */
.container {
    position: relative;
    z-index: 1;
    text-align: center;
}

/* title */
h1 {
    color: red;
    font-size: 50px;
    margin-bottom: 40px;
    text-shadow: 0 0 20px red;
}

/* card */
.card {
    border: 2px solid white;
    padding: 20px;
    width: 220px;
    margin: auto;
    background: rgba(0,0,0,0.7);
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.05);
    box-shadow: 0 0 20px white;
}

/* image */
.card img {
    width: 100%;
    border: 2px solid white;
    cursor: pointer;
}

/* name */
.name {
    margin-top: 10px;
    font-weight: bold;
}

/* facebook icon */
.fb {
    margin-top: 10px;
    font-size: 18px;
}

.fb a {
    color: #1877f2;
    text-decoration: none;
}

.fb a:hover {
    text-shadow: 0 0 10px #1877f2;
}
</style>

</head>

<body>

<div class="container">
    <h1>IWALANDXURY</h1>

    <div class="card">
        <!-- กดรูปไป Facebook -->
        <a href="https://www.facebook.com/share/1NNQojV3R2/?mibextid=wwXIfr" target="_blank">
            <img src="img.jpg">
        </a>

        <div class="name">Bxlileyzlifz Iwalandxury</div>

        <!-- โลโก้ Facebook -->
        <div class="fb">
            <a href="https://www.facebook.com/share/1NNQojV3R2/?mibextid=wwXIfr" target="_blank">
                🔵 Facebook
            </a>
        </div>
    </div>

</div>

</body>
</html>
