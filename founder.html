<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Iwalandxury</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:black;
    color:white;
    overflow:hidden;
}

/* พื้นหลัง */
body::before{
    content:"";
    position:fixed;
    width:100%;
    height:100%;
    background:url('profile.gif') center/cover no-repeat;
    opacity:0.15;
    z-index:-1;
}

/* Title */
h1{
    position:absolute;
    top:40px;
    color:red;
    font-size:40px;
    text-shadow:0 0 20px red;
}

/* Card */
.card{
    text-align:center;
    border:2px solid white;
    padding:20px;
    background:rgba(0,0,0,0.7);
    box-shadow:0 0 20px rgba(255,255,255,0.2);
}

/* รูป */
.card img{
    width:150px;
    height:150px;
    object-fit:cover;
    border:2px solid white;
    margin-bottom:10px;
}

/* ชื่อ */
.name{
    font-size:18px;
    margin-bottom:10px;
}

/* ปุ่มเฟส */
.fb{
    display:inline-block;
    padding:8px 20px;
    border:1px solid white;
    color:#1877f2;
    text-decoration:none;
    transition:0.3s;
}

.fb:hover{
    background:#1877f2;
    color:white;
    box-shadow:0 0 10px #1877f2;
}
</style>
</head>

<body>

<h1>FOUNDER</h1>

<div class="card">
    <a href="https://www.facebook.com/share/1NNQojV3R2/?mibextid=wwXIfr" target="_blank">
        <img src="profile.gif" alt="profile">
    </a>

    <div class="name">Bxlileyzlifz Iwalandxury</div>

    <a class="fb" href="https://www.facebook.com/share/1NNQojV3R2/?mibextid=wwXIfr" target="_blank">
        ● Facebook
    </a>
</div>

</body>
</html>
