<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FOUNDER</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    min-height: 100vh;
    font-family: Arial, sans-serif;
    background: url("bg.gif") no-repeat center center fixed;
    background-size: cover;
    color: white;
}

/* TITLE */
h1 {
    text-align: center;
    margin-top: 40px;
    font-size: 50px;
    color: red;
    text-shadow: 0 0 20px red, 0 0 40px red;
}

/* CONTAINER */
.container {
    display: flex;
    justify-content: center;
    align-items: center;
    flex-wrap: wrap;
    gap: 40px;
    padding: 60px 20px;
}

/* CARD */
.card {
    width: 230px;
    padding: 20px;
    border: 2px solid white;
    text-align: center;
    backdrop-filter: blur(8px);
    background: rgba(0,0,0,0.5);
    transition: 0.4s;
    position: relative;
    overflow: hidden;
}

/* glow effect */
.card::before {
    content: "";
    position: absolute;
    width: 200%;
    height: 200%;
    background: linear-gradient(45deg, transparent, red, transparent);
    top: -50%;
    left: -50%;
    transform: rotate(0deg);
    transition: 0.6s;
    opacity: 0;
}

.card:hover::before {
    transform: rotate(180deg);
    opacity: 0.3;
}

/* hover */
.card:hover {
    transform: scale(1.05);
    box-shadow: 0 0 25px red;
}

/* IMAGE */
.card img {
    width: 100%;
    height: 200px;
    object-fit: cover;
    border: 2px solid white;
}

/* NAME */
.name {
    margin-top: 10px;
    font-weight: bold;
    font-size: 16px;
}

/* ROLE */
.role {
    font-size: 13px;
    color: #aaa;
    margin-bottom: 10px;
}

/* BUTTON */
.btn {
    display: block;
    margin-top: 10px;
    padding: 10px;
    border: 1px solid white;
    text-decoration: none;
    color: white;
    transition: 0.3s;
}

.btn:hover {
    background: red;
    box-shadow: 0 0 15px red;
}
</style>

</head>
<body>

<h1>FOUNDER</h1>

<div class="container">

    <!-- CARD 1 -->
    <div class="card">
        <img src="profile.gif">
        <div class="name">TK PHUPRADUB</div>
        <div class="role">Founder</div>
        <a href="#" class="btn">Facebook</a>
    </div>

    <!-- CARD 2 -->
    <div class="card">
        <img src="profile.gif">
        <div class="name">SKY PHUPRADUB</div>
        <div class="role">Founder</div>
        <a href="#" class="btn">Facebook</a>
    </div>

    <!-- CARD 3 -->
    <div class="card">
        <img src="profile.gif">
        <div class="name">ARDUM PHUPRADUB</div>
        <div class="role">Founder</div>
        <a href="#" class="btn">Facebook</a>
    </div>

    <!-- CARD 4 -->
    <div class="card">
        <img src="profile.gif">
        <div class="name">MILL PHUPRADUB</div>
        <div class="role">Founder</div>
        <a href="#" class="btn">Facebook</a>
    </div>

</div>

</body>
</html>
