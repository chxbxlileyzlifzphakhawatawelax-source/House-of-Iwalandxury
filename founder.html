<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FOUNDER</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: Arial;
    color: white;
    text-align: center;
    background: url("bg.gif") no-repeat center center/cover;
}

/* ลดแสงพื้นหลัง */
body::before {
    content: "";
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.75);
    top: 0;
    left: 0;
    z-index: -1;
}

/* หัวข้อ */
h1 {
    margin-top: 50px;
    font-size: 60px;
    color: red;
    text-shadow: 0 0 20px red, 0 0 40px red;
}

/* grid */
.container {
    display: flex;
    justify-content: center;
    gap: 40px;
    margin-top: 60px;
    flex-wrap: wrap;
}

/* card */
.card {
    width: 230px;
    padding: 15px;
    border: 2px solid white;
    background: rgba(0,0,0,0.6);
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.05);
    box-shadow: 0 0 25px red;
}

/* รูป */
.card img {
    width: 100%;
    height: 230px;
    object-fit: cover;
    border: 2px solid white;
}

/* ชื่อ */
.name {
    margin-top: 10px;
    font-size: 18px;
    font-weight: bold;
}

/* role */
.role {
    font-size: 14px;
    color: #aaa;
}

/* ปุ่ม */
.btn {
    display: block;
    border: 1px solid white;
    padding: 8px;
    margin-top: 10px;
    text-decoration: none;
    color: white;
    transition: 0.3s;
}

.btn:hover {
    background: red;
}
</style>
</head>

<body>

<h1>FOUNDER</h1>

<div class="container">

    <div class="card">
        <img src="img.gif">
        <div class="name">TK PHUPRADUB</div>
        <div class="role">Founder</div>
        <a href="#" class="btn">Facebook</a>
    </div>

    <div class="card">
        <img src="img.gif">
        <div class="name">SKY PHUPRADUB</div>
        <div class="role">Founder</div>
        <a href="#" class="btn">Facebook</a>
    </div>

    <div class="card">
        <img src="img.gif">
        <div class="name">ARDUM PHUPRADUB</div>
        <div class="role">Founder</div>
        <a href="#" class="btn">Facebook</a>
    </div>

    <div class="card">
        <img src="img.gif">
        <div class="name">MILL PHUPRADUB</div>
        <div class="role">Founder</div>
        <a href="#" class="btn">Facebook</a>
    </div>

</div>

</body>
</html>
