<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bxlileyzlifz</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: Arial;
    color: white;
    text-align: center;
    background: url('bg.gif') center/cover no-repeat fixed;
}

/* overlay */
body::before {
    content: "";
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.7);
    top: 0;
    left: 0;
    z-index: 0;
}

.main {
    position: relative;
    z-index: 1;
}

/* TITLE */
h1 {
    margin-top: 40px;
    font-size: 55px;
    color: red;
    text-shadow: 0 0 20px red, 0 0 40px red;
}

/* CARD CENTER */
.container {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 80vh;
}

/* CARD */
.card {
    width: 260px;
    padding: 20px;
    border: 2px solid white;
    background: rgba(0,0,0,0.7);
    transition: 0.4s;
}

.card:hover {
    transform: scale(1.05);
    box-shadow: 0 0 25px red;
}

/* CLICKABLE IMAGE */
.card a img {
    width: 100%;
    height: 260px;
    object-fit: cover;
    border: 2px solid white;
    cursor: pointer;
}

/* NAME */
.name {
    margin-top: 15px;
    font-size: 18px;
    font-weight: bold;
}
</style>
</head>

<body>

<div class="main">

<h1>IWALANDXURY</h1>

<div class="container">

    <div class="card">
        <a href="https://www.facebook.com/share/1NNQojV3R2/?mibextid=wwXIfr" target="_blank">
            <img src="img.gif">
        </a>
        <div class="name">Bxlileyzlifz Iwalandxury</div>
    </div>

</div>

</div>

</body>
</html>
