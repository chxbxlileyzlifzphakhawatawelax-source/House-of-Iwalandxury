<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>FOUNDER</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial;
}

/* 🔥 แก้จอขาว */
body {
    min-height: 100vh;
    background: url("bg.gif") no-repeat center center;
    background-size: cover;
    color: white;
    text-align: center;
    overflow-x: hidden;
}

/* overlay มืด */
body::before {
    content: "";
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.65);
    z-index: -1;
}

h1 {
    color: red;
    margin-top: 40px;
    text-shadow: 0 0 20px red;
}

/* container */
.container {
    display: flex;
    justify-content: center;
    gap: 30px;
    margin-top: 60px;
    flex-wrap: wrap;
}

/* card */
.card {
    border: 2px solid white;
    padding: 15px;
    width: 180px;
    background: rgba(0,0,0,0.7);
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.05);
    box-shadow: 0 0 15px white;
}

/* image */
.card img {
    width: 100%;
    height: 180px;
    object-fit: cover;
    border: 2px solid white;
}

/* text */
.name {
    margin-top: 10px;
    font-weight: bold;
}

.role {
    font-size: 12px;
    margin-bottom: 10px;
}

/* 🔥 ปุ่ม Facebook เท่ขึ้น */
.fb-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    border: 1px solid white;
    padding: 8px;
    text-decoration: none;
    color: white;
    transition: 0.3s;
}

.fb-btn:hover {
    background: #1877f2;
    box-shadow: 0 0 10px #1877f2;
}

.fb-icon {
    color: #1877f2;
    font-weight: bold;
}
</style>

</head>

<body>

<h1>FOUNDER</h1>

<div class="container">

    <div class="card">
        <img src="img.jpg">
        <div class="name">TK PHUPRADUB</div>
        <div class="role">Founder</div>
        <a class="fb-btn" href="#">
            <span class="fb-icon">f</span> Facebook
        </a>
    </div>

    <div class="card">
        <img src="img.jpg">
        <div class="name">SKY PHUPRADUB</div>
        <div class="role">Founder</div>
        <a class="fb-btn" href="#">
            <span class="fb-icon">f</span> Facebook
        </a>
    </div>

    <div class="card">
        <img src="img.jpg">
        <div class="name">ARDUM PHUPRADUB</div>
        <div class="role">Founder</div>
        <a class="fb-btn" href="#">
            <span class="fb-icon">f</span> Facebook
        </a>
    </div>

    <div class="card">
        <img src="img.jpg">
        <div class="name">MILL PHUPRADUB</div>
        <div class="role">Founder</div>
        <a class="fb-btn" href="#">
            <span class="fb-icon">f</span> Facebook
        </a>
    </div>

</div>

</body>
</html>
