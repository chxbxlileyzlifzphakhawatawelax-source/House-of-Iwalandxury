<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>House of Iwalandxury</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  overflow: hidden;
}

body {
  background: url('bg.gif') no-repeat center center fixed;
  background-size: cover;
  font-family: monospace;
  color: white;
}

/* 🔥 ลดแสง GIF + เพิ่มโทนดำแดง */
body::before {
  content: "";
  position: fixed;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.85); /* มืดลง */
  box-shadow: inset 0 0 400px rgba(255,0,0,0.5);
  top: 0;
  left: 0;
  z-index: 1;
}

/* 🌫️ ควันเบาๆ */
.smoke {
  position: fixed;
  width: 200%;
  height: 200%;
  background: radial-gradient(circle, rgba(255,255,255,0.03), transparent);
  animation: smokeMove 25s linear infinite;
  z-index: 1;
}

@keyframes smokeMove {
  from { transform: translate(0,0); }
  to { transform: translate(-300px,-300px); }
}

/* ⚡ ฟ้าผ่า */
.flash {
  position: fixed;
  width: 100%;
  height: 100%;
  background: white;
  opacity: 0;
  pointer-events: none;
  z-index: 5;
}

/* 💀 กล่องกลาง */
.center {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
  z-index: 10;
}

/* 🔥 ข้อความหลัก (โคตรเรืองแสง) */
h1 {
  font-size: 60px;
  letter-spacing: 6px;
  color: white;

  text-shadow:
    0 0 5px #fff,
    0 0 10px #fff,
    0 0 20px red,
    0 0 40px red,
    0 0 80px darkred;
}

/* ข้อความรอง */
p {
  font-size: 18px;
  opacity: 0.8;
  text-shadow: 0 0 10px red;
}

/* 🔘 ปุ่ม */
.menu button {
  display: block;
  margin: 12px auto;
  padding: 12px;
  width: 260px;
  background: rgba(0,0,0,0.6);
  border: 1px solid white;
  color: white;
  cursor: pointer;
  transition: 0.3s;

  box-shadow: 0 0 10px rgba(255,255,255,0.3);
}

.menu button:hover {
  background: white;
  color: black;
  box-shadow: 0 0 20px red;
}

/* 👻 jumpscare */
#ghost {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: url('https://i.imgur.com/8Q2QZ6M.png') center/cover no-repeat;
  opacity: 0;
  z-index: 999;
  pointer-events: none;
}
</style>

</head>
<body>

<div class="flash" id="flash"></div>
<div class="smoke"></div>

<div class="center">
  <h1>House of Iwalandxury</h1>
  <p>NeverBroke<br>Never Give Up</p>

  <div class="menu">
    <button>FOUNDER</button>
    <button>NEVERBROKE</button>
    <button>LEADER</button>
    <button>MEMBER</button>
  </div>
</div>

<div id="ghost"></div>

<script>
// ⚡ ฟ้าผ่า
function lightning() {
  const flash = document.getElementById("flash");
  flash.style.opacity = 1;
  setTimeout(() => flash.style.opacity = 0, 120);
}

setInterval(() => {
  if (Math.random() > 0.6) lightning();
}, 2000);

// 👻 jumpscare
function scare() {
  const ghost = document.getElementById("ghost");
  ghost.style.opacity = 1;
  setTimeout(() => ghost.style.opacity = 0, 300);
}

setInterval(scare, 10000);
</script>

</body>
</html>
