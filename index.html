<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>House of Iwalandxury</title>

<style>
body {
  margin: 0;
  background: black;
  color: white;
  font-family: monospace;
  overflow: hidden;
}

/* spotlight ตามเมาส์ */
body::after {
  content: "";
  position: fixed;
  width: 100%;
  height: 100%;
  pointer-events: none;
  background: radial-gradient(circle at var(--x) var(--y), transparent 80px, black 300px);
}

/* ตา */
.eye {
  position: absolute;
  width: 20px;
  height: 10px;
  background: white;
  border-radius: 50%;
  opacity: 0.2;
  animation: blink 5s infinite;
}

@keyframes blink {
  0%, 90%, 100% { height: 10px; }
  95% { height: 1px; }
}

/* เลือดไหล */
.blood {
  position: fixed;
  top: -100px;
  width: 5px;
  height: 100px;
  background: red;
  animation: drip linear infinite;
}

@keyframes drip {
  to { transform: translateY(110vh); }
}

/* center */
.center {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
}

/* glitch */
h1 {
  animation: glitch 1.5s infinite;
}

@keyframes glitch {
  0% { text-shadow: 2px 0 red, -2px 0 blue; }
  50% { text-shadow: -2px 0 red, 2px 0 blue; }
  100% { text-shadow: 0 0 10px white; }
}

/* ปุ่ม */
.menu button {
  display: block;
  margin: 10px auto;
  padding: 10px;
  width: 250px;
  background: black;
  border: 1px solid white;
  color: white;
  cursor: pointer;
}

.menu button:hover {
  background: red;
  box-shadow: 0 0 20px red;
}
</style>
</head>

<body>

<div class="center">
  <h1>House of Iwalandxury</h1>
  <p>NeverBroke<br>Never Give Up</p>

  <div class="menu">
    <button>FOUNDER</button>
    <button>NEVERBROKE</button>
    <button>LEADER</button>
    <button>MEMBER</button>
  </div>
</div>

<!-- เสียงหลอน -->
<audio autoplay loop>
  <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3">
</audio>

<script>
/* spotlight เมาส์ */
document.addEventListener("mousemove", e => {
  document.body.style.setProperty('--x', e.clientX + 'px');
  document.body.style.setProperty('--y', e.clientY + 'px');
});

/* สร้างตา */
for (let i = 0; i < 20; i++) {
  let eye = document.createElement("div");
  eye.className = "eye";
  eye.style.top = Math.random() * 100 + "vh";
  eye.style.left = Math.random() * 100 + "vw";
  document.body.appendChild(eye);
}

/* เลือด */
for (let i = 0; i < 30; i++) {
  let b = document.createElement("div");
  b.className = "blood";
  b.style.left = Math.random() * 100 + "vw";
  b.style.animationDuration = (2 + Math.random() * 3) + "s";
  document.body.appendChild(b);
}
</script>

</body>
</html>
