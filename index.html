<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>House of Iwalandxury</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  overflow: hidden;
}

body {
  background: url('bg.gif') no-repeat center center fixed;
  background-size: cover;
  color: white;
  font-family: monospace;
}

/* มืด + แดง */
body::before {
  content: "";
  position: fixed;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.6);
  box-shadow: inset 0 0 200px rgba(255,0,0,0.3);
  top: 0;
  left: 0;
}

/* ฟ้าผ่า */
.flash {
  position: fixed;
  width: 100%;
  height: 100%;
  background: white;
  opacity: 0;
  pointer-events: none;
}

/* ควัน */
.smoke {
  position: fixed;
  width: 200%;
  height: 200%;
  background: radial-gradient(circle, rgba(255,255,255,0.05), transparent);
  animation: smokeMove 20s linear infinite;
}

@keyframes smokeMove {
  from { transform: translate(0,0); }
  to { transform: translate(-200px,-200px); }
}

/* กลางจอ */
.center {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
  z-index: 2;
}

h1 {
  letter-spacing: 4px;
}

.menu button {
  display: block;
  margin: 10px auto;
  padding: 10px;
  width: 250px;
  background: transparent;
  border: 1px solid white;
  color: white;
  cursor: pointer;
}

.menu button:hover {
  background: white;
  color: black;
}

/* jumpscare */
#ghost {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: url('https://i.imgur.com/8Q2QZ6M.png') center/cover no-repeat;
  opacity: 0;
  pointer-events: none;
  z-index: 999;
}
</style>

</head>
<body>

<div class="flash" id="flash"></div>
<div class="smoke"></div>

<div class="center">
  <h1>House of Iwalandxury</h1>
  <p>NeverBroke<br>Never Give Up</p>

  <div class="menu">
    <button>FOUNDER</button>
    <button>NEVERBROKE</button>
    <button>LEADER</button>
    <button>MEMBER</button>
  </div>
</div>

<div id="ghost"></div>

<script>
// ⚡ ฟ้าผ่า
function lightning() {
  const flash = document.getElementById("flash");
  flash.style.opacity = 1;
  setTimeout(() => flash.style.opacity = 0, 100);
}

// สุ่มฟ้าผ่า
setInterval(() => {
  if (Math.random() > 0.7) lightning();
}, 2000);

// 👻 jumpscare
function scare() {
  const ghost = document.getElementById("ghost");
  ghost.style.opacity = 1;
  setTimeout(() => ghost.style.opacity = 0, 300);
}

setInterval(scare, 10000);
</script>

</body>
</html>
