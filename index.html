<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>House of Iwalandxury</title>

<style>
html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    overflow: hidden;
}

/* 🔥 พื้นหลังเต็มจอจริง */
body {
    background: url('bg.gif') no-repeat center center fixed;
    background-size: cover;
    color: white;
    font-family: monospace;
}

/* 🔥 layer มืดทับ */
.overlay {
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.75);
    top: 0;
    left: 0;
}

/* 🔥 กลางจอ */
.main {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    z-index: 2;
}

/* 🔥 หัว */
h1 {
    font-size: 50px;
    letter-spacing: 6px;
    text-shadow: 
        0 0 10px red,
        0 0 20px red,
        0 0 40px red;
}

/* 🔥 ปุ่ม */
button {
    display: block;
    margin: 15px auto;
    padding: 12px 35px;
    background: transparent;
    border: 1px solid white;
    color: white;
    font-size: 14px;
    cursor: pointer;
    transition: 0.3s;
}

/* hover โหด */
button:hover {
    background: red;
    box-shadow: 0 0 20px red;
    transform: scale(1.05);
}
</style>
</head>

<body>

<div class="overlay"></div>

<div class="main">
    <h1>House of Iwalandxury</h1>

    <a href="founder.html"><button>FOUNDER</button></a>
    <a href="neverbroke.html"><button>NEVERBROKE</button></a>
    <a href="leader.html"><button>LEADER</button></a>
    <a href="member.html"><button>MEMBER</button></a>
</div>

</body>
</html>
