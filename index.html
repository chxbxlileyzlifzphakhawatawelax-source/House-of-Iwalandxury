<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>House of Iwalandxury</title>

<style>
body {
  margin: 0;
  background: black;
  color: white;
  font-family: monospace;
  overflow: hidden;
}

/* spotlight ตามเมาส์ */
body::after {
  content: "";
  position: fixed;
  width: 100%;
  height: 100%;
  pointer-events: none;
  background: radial-gradient(circle at var(--x) var(--y), transparent 120px, black 400px);
}

/* center */
.center {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
  z-index: 2;
}

/* glitch subtle */
h1 {
  letter-spacing: 4px;
  animation: glitch 4s infinite;
}

@keyframes glitch {
  0%,100% { opacity: 1; }
  49% { opacity: 1; }
  50% { opacity: 0.2; }
  51% { opacity: 1; }
}

/* ปุ่ม */
.menu button {
  display: block;
  margin: 10px auto;
  padding: 10px;
  width: 250px;
  background: transparent;
  border: 1px solid white;
  color: white;
  cursor: pointer;
}

.menu button:hover {
  background: white;
  color: black;
}

/* เงา entity */
.entity {
  position: fixed;
  width: 300px;
  opacity: 0.05;
  pointer-events: none;
  transition: transform 0.2s;
}

/* jump scare */
.scare {
  position: fixed;
  width: 100%;
  height: 100%;
  background: url('https://i.imgur.com/8Q2QZ6F.png') center/cover;
  opacity: 0;
  z-index: 999;
}
</style>
</head>

<body>

<div class="center">
  <h1>House of Iwalandxury</h1>
  <p>NeverBroke<br>Never Give Up</p>

  <div class="menu">
    <button>FOUNDER</button>
    <button>NEVERBROKE</button>
    <button>LEADER</button>
    <button>MEMBER</button>
  </div>
</div>

<img id="entity" class="entity" src="https://i.imgur.com/Z6XbKQp.png">
<div id="scare" class="scare"></div>

<audio id="breath" loop autoplay>
  <source src="https://www.soundjay.com/human/sounds/human-breathing-01.mp3">
</audio>

<audio id="whisper">
  <source src="https://www.soundjay.com/human/sounds/whisper-01.mp3">
</audio>

<audio id="scream">
  <source src="https://www.soundjay.com/human/sounds/scream-01.mp3">
</audio>

<script>
const entity = document.getElementById("entity");
const scare = document.getElementById("scare");
const whisper = document.getElementById("whisper");
const scream = document.getElementById("scream");

/* spotlight + entity ตามเมาส์ */
document.addEventListener("mousemove", e => {
  document.body.style.setProperty('--x', e.clientX + 'px');
  document.body.style.setProperty('--y', e.clientY + 'px');

  entity.style.left = e.clientX - 150 + "px";
  entity.style.top = e.clientY - 150 + "px";
});

/* entity โผล่ชัดขึ้นเป็นพักๆ */
function reveal() {
  entity.style.opacity = 0.3;

  setTimeout(() => {
    entity.style.opacity = 0.05;
  }, 2000);

  setTimeout(reveal, 5000 + Math.random() * 8000);
}
reveal();

/* เสียงกระซิบสุ่ม */
function whisperSound() {
  whisper.play();
  setTimeout(whisperSound, 7000 + Math.random() * 10000);
}
setTimeout(whisperSound, 5000);

/* jump scare ฉลาด */
function jumpScare() {
  scare.style.opacity = 1;
  scream.play();

  setTimeout(() => {
    scare.style.opacity = 0;
  }, 300);

  setTimeout(jumpScare, 20000 + Math.random() * 20000);
}
setTimeout(jumpScare, 15000);
</script>

</body>
</html>
