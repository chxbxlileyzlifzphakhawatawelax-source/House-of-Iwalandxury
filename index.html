<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>House of Iwalandxury</title>

<style>
body {
    margin: 0;
    background: url('bg.gif') center/cover no-repeat;
    color: white;
    font-family: monospace;
    overflow: hidden;
}

/* ลดความสว่าง bg */
body::after {
    content: "";
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.7);
    top: 0;
    left: 0;
}

/* กลางจอ */
.main {
    position: relative;
    z-index: 2;
    text-align: center;
    top: 50%;
    transform: translateY(-50%);
}

/* หัว */
h1 {
    font-size: 40px;
    letter-spacing: 5px;
    text-shadow: 0 0 20px red;
}

/* ปุ่ม */
button {
    display: block;
    margin: 15px auto;
    padding: 12px 30px;
    background: transparent;
    border: 1px solid white;
    color: white;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: red;
    box-shadow: 0 0 15px red;
}
</style>
</head>

<body>

<div class="main">
    <h1>House of Iwalandxury</h1>

    <a href="founder.html"><button>FOUNDER</button></a>
    <a href="neverbroke.html"><button>NEVERBROKE</button></a>
    <a href="leader.html"><button>LEADER</button></a>
    <a href="member.html"><button>MEMBER</button></a>
</div>

</body>
</html>
