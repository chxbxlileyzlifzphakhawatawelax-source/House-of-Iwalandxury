<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>House of Iwalandxury</title>

<style>
body {
  margin: 0;
  background: black;
  color: white;
  font-family: monospace;
  overflow: hidden;
}

/* 🔴 แสงแดงไหล */
body::before {
  content: "";
  position: fixed;
  width: 200%;
  height: 200%;
  background: radial-gradient(circle, rgba(255,0,0,0.1), transparent 70%);
  animation: redflow 8s linear infinite;
}

@keyframes redflow {
  from { transform: translate(0,0); }
  to { transform: translate(-400px,-400px); }
}

/* 🌫 ควัน */
.smoke {
  position: fixed;
  width: 200%;
  height: 200%;
  background: url("https://www.transparenttextures.com/patterns/smoke.png");
  opacity: 0.05;
  animation: smokeMove 60s linear infinite;
}

@keyframes smokeMove {
  from { transform: translate(0,0); }
  to { transform: translate(-500px,-500px); }
}

/* ⚡ ฟ้าผ่า */
.lightning {
  position: fixed;
  width: 100%;
  height: 100%;
  background: white;
  opacity: 0;
  z-index: 5;
}

.flash {
  animation: flash 0.2s;
}

@keyframes flash {
  0% { opacity: 0; }
  50% { opacity: 0.8; }
  100% { opacity: 0; }
}

/* กลางจอ */
.center {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  z-index: 2;
  text-align: center;
}

/* glitch เบา */
h1 {
  letter-spacing: 4px;
  animation: glitch 4s infinite;
}

@keyframes glitch {
  50% { opacity: 0.3; }
}

/* ปุ่ม */
.menu button {
  display: block;
  margin: 10px auto;
  padding: 10px;
  width: 250px;
  background: transparent;
  border: 1px solid white;
  color: white;
  cursor: pointer;
}

.menu button:hover {
  background: red;
}

/* 👻 jump scare */
.scare {
  position: fixed;
  width: 100%;
  height: 100%;
  background: url('ghost.png') center/contain no-repeat;
  opacity: 0;
  z-index: 999;
}
</style>
</head>

<body>

<div class="smoke"></div>
<div id="lightning" class="lightning"></div>

<div class="center">
  <h1>House of Iwalandxury</h1>
  <p>NeverBroke<br>Never Give Up</p>

  <div class="menu">
    <button>FOUNDER</button>
    <button>NEVERBROKE</button>
    <button>LEADER</button>
    <button>MEMBER</button>
  </div>
</div>

<div id="scare" class="scare"></div>

<audio id="thunder">
  <source src="https://www.soundjay.com/nature/sounds/thunder-01.mp3">
</audio>

<audio id="scream">
  <source src="https://www.soundjay.com/human/sounds/scream-01.mp3">
</audio>

<script>
const lightning = document.getElementById("lightning");
const thunder = document.getElementById("thunder");
const scare = document.getElementById("scare");
const scream = document.getElementById("scream");

/* ⚡ ฟ้าผ่า */
function lightningFlash() {
  lightning.classList.add("flash");
  thunder.play();

  setTimeout(() => {
    lightning.classList.remove("flash");
  }, 200);

  setTimeout(lightningFlash, 5000 + Math.random() * 5000);
}

lightningFlash();

/* 👻 jump scare ทุก 10 วิ */
function jumpScare() {
  scare.style.opacity = 1;
  scream.play();

  setTimeout(() => {
    scare.style.opacity = 0;
  }, 400);
}

setInterval(jumpScare, 10000);
</script>

</body>
</html>
